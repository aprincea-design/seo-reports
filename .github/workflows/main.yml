name: Weekly SEO Reports

on:
  schedule:
    # Runs every Monday at 13:00 UTC (= 6:00 AM Pacific in summer / 5:00 AM in winter).
    # GitHub uses UTC only. Change the numbers to shift the time.
    - cron: "0 13 * * 1"
  workflow_dispatch: {}   # also lets you click "Run workflow" manually to test

permissions:
  contents: write          # needed so the job can commit the report files back

jobs:
  reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull reports
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: python run_reports.py

      - name: Commit report files
        run: |
          git config user.name "report-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports
          git commit -m "Weekly SEO reports $(date +%F)" || echo "Nothing new to commit"
          git push

